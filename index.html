<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<title>Foto's Uploaden - Bruiloft</title>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>📸 Deel jullie mooiste momenten</h1>

        <p class="subtitle">
            Upload hier de foto's van onze bijzondere dag.
        </p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">💍</div>
            <p>Klik hier of sleep foto's naar dit vak</p>
        </div>

        <input type="file" id="fileInput" multiple accept="image/*">

        <div class="preview-container" id="previewContainer"></div>

        <button class="upload-btn" id="uploadBtn">
            Foto's uploaden
        </button>

        <div class="status" id="status"></div>

    </div>
</div>

<div class="container">
    <div class="card">
        <h2>📷 Live Fotogalerij</h2>
        <p>
            Hier worden alle foto's getoond die tijdens de bruiloft zijn geüpload. Blijf deze pagina verversen om de nieuwste foto's te zien!
        </p>
        <div id="gallery" class="gallery"></div>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>

    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
    <img id="lightboxImage" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
</body>
</html>
